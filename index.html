<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>護法博覽會虛擬展廳</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="home-view">
  <header class="page-header">
    <h1 id="site-title">護法博覽會虛擬展廳</h1>
    <p>點選展板，邊聽介紹邊看展板內容</p>
  </header>
  <div id="board-grid" class="board-grid">
    <div class="loading">展板載入中…</div>
  </div>
</div>

<div id="detail-view" class="detail-view">
  <div class="detail-topbar">
    <button class="back-btn" id="back-btn">← 返回選單</button>
    <div class="detail-title" id="detail-title"></div>
  </div>
  <div id="detail-body"></div>
</div>

<div id="lightbox" class="lightbox-overlay hidden">
  <button type="button" id="lightbox-close" class="lightbox-close" aria-label="關閉">✕</button>
  <img id="lightbox-img" src="" alt="">
  <div class="lightbox-hint">點兩下或兩指縮放，可拖曳查看細節</div>
</div>

<script src="js/lightbox.js"></script>
<script src="js/app.js"></script>
</body>
</html>
